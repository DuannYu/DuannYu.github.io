{% assign latest_news = site.news | sort: "date" | reverse | slice: 0, include.limit %}

<div class="my-3 bg-white shadow-sm rounded-sm">
    <h6 class="p-3 mb-0 border-bottom border-gray"><i class="fas fa-rss"></i> Latest News</h6>
    <div class="news-timeline px-3 pb-2">
        {% for item in latest_news %}
        <div class="news-item py-3 {% unless forloop.last %}border-bottom border-gray{% endunless %}">
            <div class="d-flex">
                <div class="news-date text-muted mr-3">
                    <small>{{ item.date | date: "%b %d, %Y" }}</small>
                </div>
                <div class="flex-grow-1">
                    <div class="news-content">{{ item.title }}</div>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
    
    {% if site.news | size > include.limit %}
    <div class="px-3 py-2 border-top border-gray bg-light">
        <a href="{{ '/news.html' | relative_url }}" class="btn btn-sm btn-outline-primary w-100">
            <i class="fas fa-arrow-right"></i> View All News
        </a>
    </div>
    {% endif %}
</div>
